<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TradeSync — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#08090d;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --accent:#00e5a0;--accent-dim:rgba(0,229,160,0.12);--accent-glow:rgba(0,229,160,0.4);
  --warn:#ff4d6d;--text:#f0f2f5;--muted:#718096;--panel:rgba(15,18,25,0.8);
}
body{
  background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
/* Animated background */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(0,229,160,0.07) 0%,transparent 60%),
             radial-gradient(ellipse 60% 50% at 80% 80%,rgba(99,102,241,0.07) 0%,transparent 60%);
  pointer-events:none;
}
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;animation:float 8s ease-in-out infinite;}
.orb-1{width:400px;height:400px;background:rgba(0,229,160,0.06);top:-100px;right:-100px;animation-delay:0s;}
.orb-2{width:300px;height:300px;background:rgba(99,102,241,0.06);bottom:-50px;left:-80px;animation-delay:3s;}
@keyframes float{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-20px) scale(1.05);}}

/* Card */
.card{
  width:100%;max-width:440px;padding:48px 40px;
  background:var(--panel);backdrop-filter:blur(24px);
  border:1px solid var(--border);border-radius:24px;
  box-shadow:0 24px 80px rgba(0,0,0,0.6);
  position:relative;z-index:10;
}
/* Logo */
.logo{text-align:center;margin-bottom:36px;}
.logo-mark{
  display:inline-flex;align-items:center;justify-content:center;
  width:56px;height:56px;border-radius:14px;
  background:linear-gradient(135deg,rgba(0,229,160,0.15),rgba(0,229,160,0.05));
  border:1px solid rgba(0,229,160,0.3);font-size:26px;margin-bottom:14px;
}
.logo-text{font-size:24px;font-weight:800;letter-spacing:-0.5px;}
.logo-text span{color:var(--accent);}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:1px;}

/* Tabs */
.tabs{display:flex;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:28px;}
.tab{flex:1;padding:8px;text-align:center;border-radius:7px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;border:none;background:transparent;}
.tab.active{background:rgba(0,229,160,0.12);color:var(--accent);box-shadow:0 0 0 1px rgba(0,229,160,0.3);}

/* Form */
.form-group{margin-bottom:16px;}
label{display:block;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
input[type="text"],input[type="password"]{
  width:100%;padding:12px 14px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;
  outline:none;transition:all .2s;
}
input:focus{border-color:rgba(0,229,160,0.5);background:rgba(0,229,160,0.04);box-shadow:0 0 0 4px rgba(0,229,160,0.08);}
input::placeholder{color:rgba(255,255,255,0.2);}

/* Role selector */
.role-group{display:flex;gap:10px;margin-bottom:20px;}
.role-card{
  flex:1;padding:14px 10px;border:1px solid var(--border);border-radius:12px;
  background:rgba(255,255,255,0.02);cursor:pointer;text-align:center;transition:all .2s;
}
.role-card:hover{border-color:rgba(0,229,160,0.3);background:rgba(0,229,160,0.05);}
.role-card.selected{border-color:var(--accent);background:var(--accent-dim);box-shadow:0 0 0 1px rgba(0,229,160,0.2);}
.role-em{font-size:22px;margin-bottom:6px;}
.role-title{font-size:12px;font-weight:700;color:var(--text);}
.role-desc{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;}

/* Submit button */
.btn-primary{
  width:100%;padding:14px;margin-top:8px;
  background:linear-gradient(135deg,var(--accent),#00c48c);
  border:none;border-radius:12px;
  color:#08090d;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;transition:all .2s;letter-spacing:0.3px;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,229,160,0.35);}
.btn-primary:active{transform:translateY(0);}

/* Error */
.error-msg{
  display:none;background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.3);
  color:var(--warn);padding:10px 14px;border-radius:8px;
  font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:14px;text-align:center;
}
.error-msg.show{display:block;}

/* Divider */
.divider{text-align:center;color:var(--muted);font-size:11px;font-family:'JetBrains Mono',monospace;margin:12px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
.divider::before{left:0;}.divider::after{right:0;}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-mark">⚡</div>
    <div class="logo-text">Trade<span>Sync</span></div>
    <div class="logo-sub">Real-time Collaboration Platform</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
    <button class="tab" id="tabRegister" onclick="switchTab('register')">Register</button>
  </div>

  <!-- Error -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- Login Form -->
  <div id="loginForm">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="loginUsername" placeholder="your_username" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Sign In →</button>
  </div>

  <!-- Register Form -->
  <div id="registerForm" style="display:none;">
    <div class="form-group">
      <label>Display Name</label>
      <input type="text" id="regName" placeholder="Your full name" autocomplete="name"/>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="regUsername" placeholder="unique_username" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Create a password" autocomplete="new-password"/>
    </div>
    <div class="form-group">
      <label>I am joining as</label>
      <div class="role-group">
        <div class="role-card selected" id="roleHost" onclick="selectRole('host')">
          <div class="role-em">🖥️</div>
          <div class="role-title">Host</div>
          <div class="role-desc">Share my screen</div>
        </div>
        <div class="role-card" id="roleViewer" onclick="selectRole('viewer')">
          <div class="role-em">👁️</div>
          <div class="role-title">Viewer</div>
          <div class="role-desc">Watch & annotate</div>
        </div>
      </div>
    </div>
    <button class="btn-primary" id="registerBtn" onclick="handleRegister()">Create Account →</button>
  </div>
</div>

<script>
let selectedRole = 'host';

function switchTab(tab) {
  const showLogin = tab === 'login';
  document.getElementById('loginForm').style.display = showLogin ? 'block' : 'none';
  document.getElementById('registerForm').style.display = showLogin ? 'none' : 'block';
  document.getElementById('tabLogin').classList.toggle('active', showLogin);
  document.getElementById('tabRegister').classList.toggle('active', !showLogin);
  clearError();
}

function selectRole(role) {
  selectedRole = role;
  document.getElementById('roleHost').classList.toggle('selected', role === 'host');
  document.getElementById('roleViewer').classList.toggle('selected', role === 'viewer');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function clearError() {
  document.getElementById('errorMsg').classList.remove('show');
}

function handleRegister() {
  clearError();
  const name = document.getElementById('regName').value.trim();
  const username = document.getElementById('regUsername').value.trim().toLowerCase();
  const password = document.getElementById('regPassword').value;

  if (!name || !username || !password) return showError('Please fill in all fields.');
  if (password.length < 4) return showError('Password must be at least 4 characters.');
  if (username.length < 3) return showError('Username must be at least 3 characters.');

  const users = JSON.parse(localStorage.getItem('ts_users') || '{}');
  if (users[username]) return showError('Username already taken. Please choose another.');

  users[username] = { name, username, password, role: selectedRole };
  localStorage.setItem('ts_users', JSON.stringify(users));

  // Auto-login
  localStorage.setItem('ts_session', JSON.stringify({ name, username, role: selectedRole }));
  window.location.href = '/lobby';
}

function handleLogin() {
  clearError();
  const username = document.getElementById('loginUsername').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;

  if (!username || !password) return showError('Please enter your username and password.');

  const users = JSON.parse(localStorage.getItem('ts_users') || '{}');
  const user = users[username];

  if (!user || user.password !== password) return showError('Invalid username or password.');

  localStorage.setItem('ts_session', JSON.stringify({ name: user.name, username: user.username, role: user.role }));
  window.location.href = '/lobby';
}

// Handle Enter key
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const isLogin = document.getElementById('loginForm').style.display !== 'none';
  isLogin ? handleLogin() : handleRegister();
});

// Redirect if already logged in
const session = JSON.parse(localStorage.getItem('ts_session') || 'null');
if (session) window.location.href = '/lobby';
</script>
</body>
</html>
