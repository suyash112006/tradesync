<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TradeSync — Viewer (SFU)</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/mediasoup-client.min.js"></script>

  <style>
    body { background: #0a0c0f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    #remoteVideo { width: 80%; border-radius: 12px; border: 2px solid #00cfff; background: black; }
    #status { margin-top: 10px; color: #717c8d; font-family: monospace; }
  </style>
</head>
<body>
  <h1>TradeSync Viewer (Mediasoup)</h1>
  <video id="remoteVideo" autoplay playsinline></video>
  <div id="status">Waiting for host...</div>

  <script>
    const socket = io();
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room') || 'DEFAULT';
    
    let device;
    let recvTransport;

    socket.emit('join', { roomId, role: 'viewer' }, async ({ rtpCapabilities }) => {
      // 1. Initialize Device
      device = new mediasoupClient.Device();
      await device.load({ rtpCapabilities });

      // 2. Create Receive Transport
      socket.emit('createWebRtcTransport', { roomId }, async ({ params }) => {
        recvTransport = device.createRecvTransport(params);

        recvTransport.on('connect', ({ dtlsParameters }, callback, errback) => {
          socket.emit('connectTransport', { dtlsParameters }, callback);
        });

        document.getElementById('status').innerText = 'Connected. Waiting for stream...';
      });
    });

    socket.on('new-producer', async ({ producerId }) => {
      console.log('New producer found:', producerId);
      consume(producerId);
    });

    async function consume(producerId) {
      socket.emit('consume', {
        rtpCapabilities: device.rtpCapabilities,
        producerId,
        roomId
      }, async ({ params }) => {
        const consumer = await recvTransport.consume(params);
        const stream = new MediaStream([consumer.track]);
        
        document.getElementById('remoteVideo').srcObject = stream;
        socket.emit('resume', () => {
          document.getElementById('status').innerText = 'Streaming Live (SFU)';
        });
      });
    }
  </script>
</body>
</html>
