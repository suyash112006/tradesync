<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TradeSync — Viewer (Hardened)</title>
  <script src="/peerjs.min.js"></script>
  <style>
    body { background: #0a0c0f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
    #video { width: 100%; height: 100%; object-fit: contain; background: black; }
    #status { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 20px; color: #00cfff; font-family: monospace; font-size: 12px; pointer-events: none; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <div id="status">Initializing engine...</div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const hostId = urlParams.get('id');

    const peer = new Peer({
      config: {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          {
            urls: [
              "turn:openrelay.metered.ca:80?transport=udp",
              "turn:openrelay.metered.ca:80?transport=tcp",
              "turn:openrelay.metered.ca:443?transport=tcp",
              "turns:openrelay.metered.ca:443?transport=tcp"
            ],
            username: "openrelayproject",
            credential: "openrelayproject"
          }
        ]
      }
    });

    peer.on('open', () => {
      console.log("VIEWER READY. AUTO-CONNECT TO:", hostId);
      if (hostId) {
        document.getElementById("status").innerText = "🔗 Connecting to Host...";
        connectToHost(hostId);
      }
    });

    function connectToHost(id) {
      // ✅ CRITICAL: Using null for Receive-Only call
      const call = peer.call(id, null);

      if (!call) {
        console.warn("Call failed to initiate. Retrying...");
        setTimeout(() => connectToHost(id), 1000);
        return;
      }

      call.on('stream', stream => {
        console.log("✅ STREAM RECEIVED");
        const video = document.getElementById("video");
        video.srcObject = stream;
        
        video.onloadedmetadata = () => {
          video.play().catch(e => console.warn("Autoplay block:", e));
          document.getElementById("status").innerText = "Streaming LIVE";
        };
      });

      call.on('error', err => {
        console.error("CALL ERROR:", err);
        document.getElementById("status").innerText = "❌ Error: " + err.type;
      });
    }
  </script>
</body>
</html>
