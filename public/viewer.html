<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TradeSync — Viewer</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body { background: #0a0c0f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    #remoteVideo { width: 80%; border-radius: 12px; border: 2px solid #00cfff; background: black; }
    #status { margin-top: 10px; color: #717c8d; font-family: monospace; }
  </style>
</head>
<body>
  <h1>TradeSync Viewer (PeerJS)</h1>
  <video id="remoteVideo" autoplay playsinline></video>
  <div id="status">Connecting to host...</div>
  <button id="callBtn" onclick="tryCall()" style="margin-top: 20px; padding: 10px 20px; background: #00cfff; border: none; border-radius: 8px; color: black; font-weight: bold; cursor: pointer; display: none;">Join Stream</button>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room') || 'DEFAULT_ROOM';
    let streamReceived = false;
    
    const peer = new Peer({
      config: {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          {
            urls: "turn:openrelay.metered.ca:80?transport=udp",
            username: "openrelayproject",
            credential: "openrelayproject"
          }
        ]
      }
    });

    function tryCall() {
      if (streamReceived) return;
      console.log('[PEER] Calling host:', roomId + '-host');
      const call = peer.call(roomId + '-host', new MediaStream());
      
      call.on('stream', (remoteStream) => {
        console.log('[PEER] Stream received! ✅');
        streamReceived = true;
        document.getElementById('remoteVideo').srcObject = remoteStream;
        document.getElementById('status').innerText = 'Streaming Live';
        document.getElementById('callBtn').style.display = 'none';
      });

      // Timeout for UI update
      setTimeout(() => {
        if (!streamReceived) {
          document.getElementById('status').innerText = 'Still waiting for host...';
          document.getElementById('callBtn').style.display = 'block';
        }
      }, 3000);
    }

    peer.on('open', (id) => {
      console.log('My peer ID is: ' + id);
      tryCall();
    });

    // 🔥 Auto-Retry every 10 seconds if no stream
    setInterval(() => {
      if (!streamReceived) tryCall();
    }, 10000);
  </script>

</body>
</html>
