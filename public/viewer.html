<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TradeSync — Viewer (Manual)</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body { background: #0a0c0f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    #video { width: 80%; border-radius: 12px; border: 2px solid #00cfff; background: black; margin-bottom: 20px; }
    .controls { background: #111; padding: 20px; border-radius: 8px; border: 1px solid #333; display: flex; gap: 10px; }
    input { padding: 12px; background: #222; border: 1px solid #444; border-radius: 6px; color: white; font-family: monospace; width: 300px; outline: none; }
    input:focus { border-color: #00cfff; }
    button { padding: 12px 24px; background: #00cfff; border: none; border-radius: 8px; color: black; font-weight: bold; cursor: pointer; font-size: 16px; }
    #status { margin-top: 10px; color: #717c8d; font-family: monospace; }
  </style>
</head>
<body>
  <h1>TradeSync Viewer</h1>
  <video id="video" autoplay playsinline></video>
  
  <div class="controls">
    <input id="hostId" placeholder="Enter Host ID here...">
    <button id="connectBtn">Connect to Host</button>
  </div>
  <div id="status">Ready to connect...</div>

  <script>
    const peer = new Peer();

    peer.on('open', id => {
      console.log("VIEWER ID:", id);
    });

    document.getElementById("connectBtn").onclick = () => {
      const hostId = document.getElementById("hostId").value.trim();
      if (!hostId) {
        alert("Please enter a valid Host ID.");
        return;
      }

      document.getElementById("status").innerText = "Calling host...";
      // We send a null stream because we only want to RECEIVE
      const call = peer.call(hostId, new MediaStream());

      call.on('stream', stream => {
        console.log("Stream received! ✅");
        const video = document.getElementById("video");
        video.srcObject = stream;
        document.getElementById("status").innerText = "Streaming LIVE";
        document.querySelector(".controls").style.display = "none";
      });

      call.on('error', err => {
        console.error("Call error:", err);
        document.getElementById("status").innerText = "Error: " + err.type;
        alert("Could not connect to Host. Check ID or firewall.");
      });
    };
  </script>
</body>
</html>
