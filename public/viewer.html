<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>TradeSync — Viewer (Pro)</title>
<script src="/peerjs.min.js"></script>
<style>
  body { background:#0a0c0f; color:#f0f2f5; font-family:sans-serif; height:100vh; margin:0; overflow:hidden; }
  #video { width:100%; height:100%; object-fit:contain; background:#000; }
  #status { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); padding:8px 16px; border-radius:20px; color:#00e5a0; font-size:12px; }
</style>
</head>
<body>
<video id="video" autoplay playsinline></video>
<div id="status">Connecting to Host...</div>
<script>
  const peer = new Peer({ host: 'localhost', port: 9000, path: '/myapp' });

  peer.on('open', () => {
    const call = peer.call('tradesync-host', null);
    if (call) {
      call.on('stream', stream => {
        document.getElementById('video').srcObject = stream;
        document.getElementById('status').innerText = "LIVE";
      });
    }
  });
</script>
</body>
</html>
