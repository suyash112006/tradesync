<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TradeSync — Viewer (Auto-Pilot)</title>
  <script src="/peerjs.min.js"></script>
  <style>
    body { background: #0a0c0f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
    #video { width: 100%; height: 100%; object-fit: contain; background: black; }
    #status { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 20px; color: #00cfff; font-family: monospace; font-size: 12px; pointer-events: none; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <div id="status">Initializing engine...</div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const hostId = urlParams.get('id');

    if (!hostId) {
      document.getElementById("status").innerText = "❌ Error: No Host ID provided in URL";
    }

    const peer = new Peer({
      config: {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          {
            urls: [
              "turn:openrelay.metered.ca:80?transport=udp",
              "turn:openrelay.metered.ca:80?transport=tcp",
              "turn:openrelay.metered.ca:443?transport=tcp",
              "turns:openrelay.metered.ca:443?transport=tcp"
            ],
            username: "openrelayproject",
            credential: "openrelayproject"
          }
        ],
        iceCandidatePoolSize: 10
      }
    });

    let connWatchdog;

    peer.on('open', id => {
      console.log("VIEWER ID:", id);
      if (hostId) {
        document.getElementById("status").innerText = "🔗 Auto-Connecting to Host...";
        setTimeout(() => connectToHost(hostId), 500);
      }
    });

    function connectToHost(hostId) {
      const call = peer.call(hostId, new MediaStream());

      // 🔥 Watchdog: If no stream in 5s, re-kick the hardware
      clearTimeout(connWatchdog);
      connWatchdog = setTimeout(() => {
        if (document.getElementById("status").innerText !== "Streaming LIVE") {
          console.log("[WATCHDOG] Stream stalled. Re-kicking...");
          connectToHost(hostId);
        }
      }, 5000);

      if (call) {
        call.on('stream', stream => {
          clearTimeout(connWatchdog);
          console.log("Stream received! ✅");
          const video = document.getElementById("video");
          video.srcObject = stream;
          video.play().catch(e => console.warn("Autoplay blocked."));
          document.getElementById("status").innerText = "Streaming LIVE";
        });

        call.on('error', err => {
          console.error("Call error:", err);
          document.getElementById("status").innerText = "❌ Connection failed: " + err.type;
        });
      }
    }
  </script>
</body>
</html>
