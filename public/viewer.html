<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TradeSync — Viewer (LiveKit)</title>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <style>
    body { background: #0a0c0f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
    #remoteVideo { width: 100%; height: 100%; object-fit: contain; background: black; }
    #status { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 20px; color: #00cfff; font-family: monospace; font-size: 12px; pointer-events: none; }
  </style>
</head>
<body>
  <div id="videoContainer" style="width:100%; height:100%;">
    <!-- Video element will be attached here by LiveKit -->
  </div>
  <div id="status">Connecting to SFU...</div>

  <script>
    // 🔥 UPDATE THIS with your Cloudflare LiveKit Tunnel URL
    const LIVEKIT_URL = "ws://localhost:7880";

    async function initViewer() {
      // 1. Get Token
      const resp = await fetch('/getToken?identity=viewer-user');
      const { token } = await resp.json();

      // 2. Connect
      const room = new LiveKitClient.Room();
      await room.connect(LIVEKIT_URL, token);
      document.getElementById('status').innerText = "Connected. Waiting for host...";

      // 3. Handle incoming tracks
      room.on(LiveKitClient.RoomEvent.TrackSubscribed, (track, publication, participant) => {
        if (track.kind === 'video') {
          const element = track.attach();
          element.id = "remoteVideo";
          document.getElementById('videoContainer').appendChild(element);
          document.getElementById('status').innerText = "🟢 STREAMING LIVE";
        }
      });

      room.on(LiveKitClient.RoomEvent.TrackUnsubscribed, (track) => {
        track.detach();
        document.getElementById('status').innerText = "Host stopped sharing.";
      });
    }

    initViewer();
  </script>
</body>
</html>
