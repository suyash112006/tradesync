<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>TradeSync — Host (Pro)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet"/>
<script src="/peerjs.min.js"></script>
<style>
  body { background:#0a0c0f; color:#f0f2f5; font-family:'Inter',sans-serif; height:100vh; margin:0; display:flex; flex-direction:column; }
  .topbar { padding:12px 24px; border-bottom:1px solid #1e242d; background:#13161c; display:flex; justify-content:space-between; }
  .logo { font-weight:800; font-size:20px; } .logo span { color:#00e5a0; }
  .main { flex:1; position:relative; overflow:hidden; }
  #localVideo { width:100%; height:100%; object-fit:contain; background:#000; display:none; }
  .toolbar { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(15,18,23,0.9); padding:10px 20px; border-radius:12px; display:flex; gap:10px; backdrop-filter:blur(10px); border:1px solid #1e242d; }
  button { padding:8px 16px; background:#00e5a0; border:none; border-radius:6px; color:#000; font-weight:bold; cursor:pointer; }
  #inviteLink { color:#717c8d; font-size:11px; margin-top:10px; display:block; }
</style>
</head>
<body>
<div class="topbar"><div class="logo">Trade<span>Sync</span> PRO</div><div id="status">Ready</div></div>
<div class="main">
  <video id="localVideo" autoplay muted playsinline></video>
  <div class="toolbar">
    <button onclick="startStream()">Start 60FPS Share</button>
    <button onclick="copyInvite()">Copy Invite</button>
  </div>
</div>
<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
  const peer = new Peer('tradesync-host', { host: 'localhost', port: 9000, path: '/myapp' });
  let currentStream;

  async function startStream() {
    currentStream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: 60 } });
    document.getElementById('localVideo').srcObject = currentStream;
    document.getElementById('localVideo').style.display = 'block';
    document.getElementById('status').innerText = "LIVE";
  }

  peer.on('call', call => {
    if (currentStream) {
      call.answer(currentStream);
    }
  });

  function copyInvite() {
    navigator.clipboard.writeText(window.location.origin + '/viewer.html');
    alert("Invite Link Copied!");
  }
</script>
</body>
</html>
