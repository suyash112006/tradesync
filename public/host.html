<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TradeSync — Host (SFU)</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/mediasoup-client.min.js"></script>

  <style>
    body { background: #0a0c0f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    #localVideo { width: 80%; border-radius: 12px; border: 2px solid #00e5a0; background: black; }
    button { padding: 12px 24px; background: #00e5a0; border: none; border-radius: 8px; color: black; font-weight: bold; cursor: pointer; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>TradeSync Host (Mediasoup)</h1>
  <video id="localVideo" autoplay playsinline muted></video>
  <button id="shareBtn" onclick="startSharing()">Start Screen Share</button>

  <script>
    const socket = io();
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room') || 'DEFAULT';
    
    let device;
    let sendTransport;

    async function startSharing() {
      // 1. Get Screen Stream
      const stream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: { ideal: 30 } }
      });
      document.getElementById('localVideo').srcObject = stream;
      const track = stream.getVideoTracks()[0];

      // 2. Join Room & Get Router Capabilities
      socket.emit('join', { roomId, role: 'host' }, async ({ rtpCapabilities }) => {
        // 3. Initialize Mediasoup Device
        device = new mediasoupClient.Device();
        await device.load({ rtpCapabilities });

        // 4. Create Send Transport
        socket.emit('createWebRtcTransport', { roomId }, async ({ params }) => {
          sendTransport = device.createSendTransport(params);

          sendTransport.on('connect', ({ dtlsParameters }, callback, errback) => {
            socket.emit('connectTransport', { dtlsParameters }, callback);
          });

          sendTransport.on('produce', ({ kind, rtpParameters }, callback, errback) => {
            socket.emit('produce', { kind, rtpParameters, roomId }, ({ id }) => callback({ id }));
          });

          // 5. Start Producing
          await sendTransport.produce({ track });
          console.log('Streaming started via Mediasoup SFU');
          document.getElementById('shareBtn').style.display = 'none';
        });
      });
    }
  </script>
</body>
</html>
